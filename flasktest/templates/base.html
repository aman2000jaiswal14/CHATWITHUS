<!DOCTYPE html>
<html>

<head>
  <title>Flask App</title>
</head>

<body>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  {% with messages = get_flashed_messages() %}
  {% if messages %}
  {% for message in messages %}
  <p class="flash-message">{{ message }}</p>
  {% endfor %}
  {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}

</body>

</html>
