<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Main Application{% endblock %}</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --text-color: #1f2937;
            --card-bg: #ffffff;
            --border-color: #e5e7eb;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .navbar {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
        }

        .navbar-brand {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary-color);
            text-decoration: none;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            margin-left: 1.5rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--primary-color);
        }

        .btn {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            text-decoration: none;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: var(--primary-hover);
            color: white;
        }

        .btn-outline {
            background-color: transparent;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
        }

        .btn-outline:hover {
            background-color: var(--primary-color);
            color: white;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            flex-grow: 1;
            width: 100%;
            box-sizing: border-box;
        }

        .auth-card {
            background-color: var(--card-bg);
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 2rem;
            max-width: 400px;
            margin: 2rem auto;
            border: 1px solid var(--border-color);
        }

        .auth-card h2 {
            margin-top: 0;
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.875rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            box-sizing: border-box;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .form-actions {
            margin-top: 1.5rem;
        }

        .form-actions .btn {
            width: 100%;
            padding: 0.75rem;
        }

        .auth-links {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.875rem;
        }

        .auth-links a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .auth-links a:hover {
            text-decoration: underline;
        }

        .errorlist {
            color: #dc2626;
            list-style-type: none;
            padding: 0;
            margin: 0.5rem 0;
            font-size: 0.875rem;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <a href="{% url 'home' %}" class="navbar-brand">MainApp</a>
        <div class="nav-links">
            {% if user.is_authenticated %}
            <span style="font-weight: 500; margin-right: 1.5rem;">Hello, {{ user.name|default:user.username }}</span>
            <a href="{% url 'dashboard' %}">Dashboard</a>
            <form action="{% url 'logout' %}" method="post" style="display: inline; margin-left: 1.5rem;">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline"
                    style="padding: 0.25rem 0.75rem; font-size: 0.875rem;">Logout</button>
            </form>
            {% else %}
            <a href="{% url 'login' %}" class="btn btn-outline" style="padding: 0.25rem 0.75rem;">Login</a>
            <a href="{% url 'register' %}" class="btn"
                style="padding: 0.25rem 0.75rem; margin-left: 0.5rem;">Register</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    {% if user.is_authenticated %}
    <!-- Chat Widget Config -->
    <script>
        window.CHAT_CONFIG = {
            USER_ID: "{{ user.username }}",
            CSRF_TOKEN: "{{ csrf_token }}",
            WS_URL: ((window.location.protocol === "https:") ? "wss://" : "ws://") + window.location.host + "/ws/chat/{{ user.username }}/"
        };
    </script>
    <!-- Chat Widget Script -->
    <script src="{% static 'chat/widget.js' %}"></script>
    {% endif %}
</body>

</html>
