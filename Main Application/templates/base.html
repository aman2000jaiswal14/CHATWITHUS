<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Main Application{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
    <link rel="stylesheet" href="{% static 'css/main-styles.css' %}">
</head>

<body>
    <nav class="navbar">
        <a href="{% url 'home' %}" class="navbar-brand">MainApp</a>
        <div class="nav-links">
            {% if user.is_authenticated %}
            <span class="user-greeting">Hello, {{ user.name|default:user.username }}</span>
            <a href="{% url 'dashboard' %}">Dashboard</a>
            <form action="{% url 'logout' %}" method="post" class="logout-form">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline btn-small">Logout</button>
            </form>
            {% else %}
            <a href="{% url 'login' %}" class="btn btn-outline btn-nav">Login</a>
            <a href="{% url 'register' %}" class="btn btn-register">Register</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    {% if user.is_authenticated %}
    <!-- Chat Widget Anchor Point -->
    <div id="root"></div>

    <!-- Chat Widget Config -->
    <script id="chat-config" type="application/json">
        {
            "USER_ID": "{{ user.username|escapejs }}",
            "TOKEN": "{{ user.jwt_token|escapejs }}",
            "USER_NAME": "{{ user.name|default:user.username|escapejs }}",
            "USER_ROLE": "{{ user.role|escapejs }}",
            "API_USERS_URL": "/chat/api/users/",
            "API_BOOKMARKS_URL": "/chat/api/bookmarks/",
            "API_BOOKMARK_ADD_URL": "/chat/api/bookmarks/add/",
            "API_BOOKMARK_REMOVE_URL": "/chat/api/bookmarks/remove/",
            "API_GROUPS_URL": "/chat/api/groups/",
            "API_GROUP_CREATE_URL": "/chat/api/groups/create/",
            "WS_URL": "ws://{{ request.get_host|escapejs }}/ws/chat/{{ user.username|urlencode }}/",
            "CSRF_TOKEN": "{{ csrf_token|escapejs }}",
            "LICENSE_INFO": {{ CWU_LICENSE_JSON|safe }}
        }
    </script>
    <script src="{% static 'js/init-chat.js' %}"></script>

    <script type="module" src="{% static 'chat/ChatWithUsWid.js' %}?v={% now 'U' %}"></script>
    {% endif %}
</body>

</html>
